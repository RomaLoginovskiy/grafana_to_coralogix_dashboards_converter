name: Conformance CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Discover solution or project
        id: discovery
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t solutions < <(git ls-files '*.sln')
          if [ "${#solutions[@]}" -gt 0 ]; then
            target_path="$(printf '%s\n' "${solutions[@]}" | LC_ALL=C sort | sed -n '1p')"
            target_kind="solution"
          else
            mapfile -t projects < <(git ls-files '*.csproj')
            if [ "${#projects[@]}" -eq 0 ]; then
              echo "No .sln or .csproj files found in repository."
              exit 1
            fi

            target_path="$(printf '%s\n' "${projects[@]}" | LC_ALL=C sort | sed -n '1p')"
            target_kind="project"
          fi

          echo "target_path=${target_path}" >> "$GITHUB_OUTPUT"
          echo "target_kind=${target_kind}" >> "$GITHUB_OUTPUT"
          echo "Using ${target_kind}: ${target_path}"

      - name: Restore
        run: dotnet restore "${{ steps.discovery.outputs.target_path }}"

      - name: Build
        run: dotnet build "${{ steps.discovery.outputs.target_path }}" --configuration Release --no-restore

      - name: Test
        run: dotnet test "${{ steps.discovery.outputs.target_path }}" --configuration Release --no-build

  conformance_filtered_tests:
    name: "${{ matrix.category }} tests"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - category: Conformance
            filter: Category=Conformance
          - category: Golden
            filter: Category=Golden
          - category: Differential
            filter: Category=Differential
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Discover solution or project
        id: discovery
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t solutions < <(git ls-files '*.sln')
          if [ "${#solutions[@]}" -gt 0 ]; then
            target_path="$(printf '%s\n' "${solutions[@]}" | LC_ALL=C sort | sed -n '1p')"
            target_kind="solution"
          else
            mapfile -t projects < <(git ls-files '*.csproj')
            if [ "${#projects[@]}" -eq 0 ]; then
              echo "No .sln or .csproj files found in repository."
              exit 1
            fi

            target_path="$(printf '%s\n' "${projects[@]}" | LC_ALL=C sort | sed -n '1p')"
            target_kind="project"
          fi

          echo "target_path=${target_path}" >> "$GITHUB_OUTPUT"
          echo "target_kind=${target_kind}" >> "$GITHUB_OUTPUT"
          echo "Using ${target_kind}: ${target_path}"

      - name: Restore
        run: dotnet restore "${{ steps.discovery.outputs.target_path }}"

      - name: Build
        run: dotnet build "${{ steps.discovery.outputs.target_path }}" --configuration Release --no-restore

      - name: Run filtered tests
        shell: bash
        run: |
          set -euo pipefail

          output_file="$(mktemp)"
          dotnet test "${{ steps.discovery.outputs.target_path }}" \
            --configuration Release \
            --no-build \
            --filter "${{ matrix.filter }}" \
            | tee "$output_file"

          if grep -q "No test matches the given testcase filter" "$output_file"; then
            echo "Filtered stage '${{ matrix.category }}' did not execute any tests."
            exit 1
          fi
